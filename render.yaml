services:
  - type: web
    name: cl-beds-api
    runtime: python
    region: oregon
    plan: starter         # upgrade to standard for production

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      - key: APP_NAME
        value: CL-BEDS
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: '["https://cl-beds.vercel.app","http://localhost:5173"]'
      - key: ROBERTA_MODEL_NAME
        value: cardiffnlp/twitter-roberta-base-emotion
